    frame_A_names: [kiwi::origin]
    frame_B_name: center_zone
    region_B: !XYCircle
      radius: 0.15
  - &MugNotNearCoaster
    !FramesNotInXYRegionConstraint
    frame_A_names: [mug::center]
    frame_B_name: coaster::center_base__z_up
    region_B: !XYCircle
      radius: 0.1875
  - &CupNotNearCoaster
