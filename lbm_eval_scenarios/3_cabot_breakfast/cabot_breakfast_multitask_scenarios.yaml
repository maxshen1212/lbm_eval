_lcm_buses_options:
  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus)
  # to enable single-process simulation with Meldis visualization server.
  - &VisualizerLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus
  # and camera) to enable single-process simulation with Meldis visualization
  # server.
  - &VisualizerCameraLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: udpm://239.255.2.1:6776?ttl=0
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (including visualizer_bus)
  # to enable single-process simulation with Meshcat visualization only.
  - &VisualizerLocalOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus:
      lcm_url: memq://null

# List of directives that can be used to compose a scene.
_directives:
  # The robot and table.
  - &RobotAndTable
    add_directives:
      file: package://lbm_eval_models/stations/cabot/add_cabot_simulation.dmd.yaml
  # Objects for "OneOfEverything" - not to be used for production scenarios.
  - &ExampleBanana
    add_model:
      file: package://lbm_eval_models/groceries/bananas/fake_ripe_banana.sdf
      name: banana
      default_free_body_pose:
        fake_banana:
          base_frame: manipuland_table::station_table_top
          translation: [0.2, 0.4, 0.05]
          rotation: !Rpy
            deg: [90, 0, 0]
  - &ExampleOrange
    add_model:
      file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
      name: orange
      default_free_body_pose:
        fake_ycb_orange:
          base_frame: manipuland_table::station_table_top
          translation: [0.1, 0.4, 0.05]
  - &ExampleApple
    add_model:
      file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
      name: apple
      default_free_body_pose:
        fake_sweet_crispin_apple:
          base_frame: manipuland_table::station_table_top
          translation: [0.0, 0.4, 0.05]
  - &ExampleKiwi
    add_model:
      file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
      name: kiwi
      default_free_body_pose:
        fake_kiwi:
          base_frame: manipuland_table::station_table_top
          translation: [-0.1, 0.4, 0.05]
  - &ExampleMug
    add_model:
      file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
      name: mug
      default_free_body_pose:
        mug_bottom_center__z_up:
          base_frame: manipuland_table::station_table_top
          translation: [-0.2, 0.4, 0.05]
          rotation: !Rpy
            deg: [0, 0, 90]
  - &ExampleCup
    add_model:
      file: package://lbm_eval_models/tableware/tumblers/tumbler_8oz_tropical_pink.sdf
      name: cup
      default_free_body_pose:
        tumbler_8oz:
          base_frame: manipuland_table::station_table_top
          translation: [0.1, 0.2, 0]
  - &ExampleCoaster
    add_model:
      file: package://lbm_eval_models/tableware/coasters/coaster_double_wood_cylinder_collision.sdf
      name: coaster
      default_free_body_pose:
        coaster_double:
          base_frame: manipuland_table::station_table_top
          translation: [0.2, 0.2, 0.0]
  - &ExampleSaucer
    add_model:
      file: package://lbm_eval_models/tableware/plates/carlisle_plate_light_blue.sdf
      name: saucer
      default_free_body_pose:
        flush_bottom_center__z_up:
          base_frame: manipuland_table::station_table_top
          translation: [0.1, 0.0, 0.0]
  - &ExampleCerealBox
    add_model:
      file: package://lbm_eval_models/groceries/cereals/drake_flakes_cereal_box.sdf
      name: cereal_box
  - &ExampleCerealBoxWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: cereal_box::at_rest_right_side_up
      X_PC:
        translation: [0.15, 0.6, 0]
  - &ExampleBowl
    add_model:
      file: package://lbm_eval_models/tableware/bowls/evo_bowl_white.sdf
      name: bowl
  - &ExampleBowlWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: bowl::at_rest_right_side_up
      X_PC:
        translation: [0.15, -0.6, 0.0]
  - &ExampleSpatula
    add_model:
      file: package://lbm_eval_models/tableware/spatulas/thimma_wood_natural_flat_spatula.sdf
      name: spatula
  - &ExampleSpatulaWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: spatula::at_rest_right_side_up
      X_PC:
        translation: [-0.15, 0.6, 0]
  - &ExampleServingSpoon
    add_model:
      file: package://lbm_eval_models/tableware/spoons/spoon_oxo_steel.sdf
      name: serving_spoon
  - &ExampleServingSpoonWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: serving_spoon::at_rest_right_side_up
      X_PC:
        translation: [-0.15, -0.6, 0]
  - &ExampleKnife
    add_model:
      file: package://lbm_eval_models/tableware/knives/cambridge_jubilee_stainless_plastic_blue_knife.sdf
      name: knife
  - &ExampleKnifeWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: knife::at_rest_right_side_up
      X_PC:
        translation: [0.2, -0.4, 0]
        rotation: !Rpy
          deg: [0, 0, 90]
  - &ExampleFork
    add_model:
      file: package://lbm_eval_models/tableware/forks/cambridge_jubilee_stainless_plastic_blue_fork.sdf
      name: fork
  - &ExampleForkWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: fork::at_rest_right_side_up
      X_PC:
        translation: [0.1, -0.4, 0]
        rotation: !Rpy
          deg: [0, 0, 90]
  - &ExampleTeaspoon
    add_model:
      file: package://lbm_eval_models/tableware/spoons/cambridge_jubilee_stainless_plastic_blue_teaspoon.sdf
      name: teaspoon
  - &ExampleTeaspoonWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: teaspoon::at_rest_right_side_up
      X_PC:
        translation: [0.0, -0.4, 0.0]
        rotation: !Rpy
          deg: [0, 0, 90]
  - &ExampleDinnerSpoon
    add_model:
      file: package://lbm_eval_models/tableware/spoons/cambridge_jubilee_stainless_plastic_blue_dinner_spoon.sdf
      name: dinner_spoon
  - &ExampleDinnerSpoonWeld
    add_weld:
      parent: manipuland_table::station_table_top
      child: dinner_spoon::at_rest_right_side_up
      X_PC:
        translation: [-0.1, -0.4, 0]
        rotation: !Rpy
          deg: [0, 0, 90]
  # Welded distractor directives.
  - &Distractor0Frame0
    add_frame:
      name: distractor_0_region_0
      X_PF:
        base_frame: manipuland_table::origin
        translation: !UniformVector
          min: [-0.3, -0.5, 0.0]
          max: [-0.2, -0.2, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &Distractor0Frame1
    add_frame:
      name: distractor_0_region_1
      X_PF:
        base_frame: manipuland_table::origin
        translation: !UniformVector
          min: [-0.3, -0.6, 0.0]
          max: [ 0.2, -0.5, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &Distractor0Frame2
    add_frame:
      name: distractor_0_region_2
      X_PF:
        base_frame: manipuland_table::origin
        translation: !UniformVector
          min: [0.2, -0.6, 0.0]
          max: [0.3, -0.1, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &Distractor0
    !SampleNumCopiesAndFlatten
    num_copies: !UniformDiscrete
      values: [0, 1]
    elements:
      - add_model:
          file: !UniformDiscreteString
            values: &DistractorsList
              - package://lbm_eval_models/groceries/cereals/drake_flakes_cereal_box.sdf
              - package://lbm_eval_models/tableware/bowls/evo_bowl_white.sdf
              - package://lbm_eval_models/tableware/spatulas/thimma_wood_natural_flat_spatula.sdf
              - package://lbm_eval_models/tableware/spoons/spoon_oxo_steel.sdf
              - package://lbm_eval_models/tableware/knives/cambridge_jubilee_stainless_plastic_blue_knife.sdf
              - package://lbm_eval_models/tableware/forks/cambridge_jubilee_stainless_plastic_blue_fork.sdf
              - package://lbm_eval_models/tableware/spoons/cambridge_jubilee_stainless_plastic_blue_teaspoon.sdf
              - package://lbm_eval_models/tableware/spoons/cambridge_jubilee_stainless_plastic_blue_dinner_spoon.sdf
          name: distractor_0
      - add_weld:
          parent: !UniformDiscreteString
            values:
              - distractor_0_region_0
              - distractor_0_region_1
              - distractor_0_region_2
          child: distractor_0::at_rest_right_side_up
  - &Distractor1Frame0
    add_frame:
      name: distractor_1_region_0
      X_PF:
        base_frame: manipuland_table::origin
        translation: !UniformVector
          min: [-0.3, 0.2, 0.0]
          max: [-0.2, 0.5, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &Distractor1Frame1
    add_frame:
      name: distractor_1_region_1
      X_PF:
        base_frame: manipuland_table::origin
        translation: !UniformVector
          min: [-0.3, 0.5, 0.0]
          max: [ 0.2, 0.6, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &Distractor1Frame2
    add_frame:
      name: distractor_1_region_2
      X_PF:
        base_frame: manipuland_table::origin
        translation: !UniformVector
          min: [0.2, 0.1, 0.0]
          max: [0.3, 0.6, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &Distractor1
    !SampleNumCopiesAndFlatten
    num_copies: !UniformDiscrete
      values: [0, 1]
    elements:
      - add_model:
          file: !UniformDiscreteString
            values: *DistractorsList
          name: distractor_1
      - add_weld:
          parent: !UniformDiscreteString
            values:
              - distractor_1_region_0
              - distractor_1_region_1
              - distractor_1_region_2
          child: distractor_1::at_rest_right_side_up
  # Randomized fruit.
  - &RandomFruitMugCupFrame0
    add_frame:
      name: fruit_mug_cup_region_0
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.05, -0.3, 0]
  - &RandomFruitMugCupFrame1
    add_frame:
      name: fruit_mug_cup_region_1
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.05, -0.1, 0]
  - &RandomFruitMugCupFrame2
    add_frame:
      name: fruit_mug_cup_region_2
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.05, 0.1, 0]
  - &RandomFruitMugCupFrame3
    add_frame:
      name: fruit_mug_cup_region_3
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.05, 0.4, 0]
  - &RandomFruitSelection
    num_copies: !UniformDiscrete
      values: [3, 4]
    add_model: !UniformManipuland
      name: fruit
      values:
        - file: package://lbm_eval_models/groceries/bananas/fake_ripe_banana.sdf
          default_free_body_pose:
            fake_banana:
              base_frame: &RandomFruitMugCupBaseFrame !UniformDiscreteString
                values:
                  - fruit_mug_cup_region_0
                  - fruit_mug_cup_region_1
                  - fruit_mug_cup_region_2
                  - fruit_mug_cup_region_3
              translation: &RandomBananaTranslation !UniformVector
                min: [-0.25, -0.1, 0.019]
                max: [ 0.25,  0.1, 0.019]
              rotation: &RandomBananaKiwiRotation !Rpy
                deg:
                  # Rotate the banana so that the long dimension is parallel to
                  # the table.
                  - !UniformDiscrete {values: [90, -90]}
                  - 0
                  # Rotate around z by any amount.
                  - !Uniform {min: -180, max:  180}
        - file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
          default_free_body_pose:
            fake_ycb_orange:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: &RandomOrangeTranslation !UniformVector
                min: [-0.25, -0.1, 0.038]
                max: [ 0.25,  0.1, 0.038]
              # TODO(#11698) Replace this with !Uniform.
              rotation: &RandomUniformRotation !Rpy
                deg: !UniformVector
                  min: [-180, -180, -180]
                  max: [180, 180, 180]
        - file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
          default_free_body_pose:
            fake_sweet_crispin_apple:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: &RandomAppleTranslation !UniformVector
                min: [-0.25, -0.1, 0.037]
                max: [ 0.25,  0.1, 0.037]
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
          default_free_body_pose:
            fake_kiwi:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: &RandomKiwiTranslation !UniformVector
                min: [-0.25, -0.1, 0.027]
                max: [ 0.25,  0.1, 0.027]
              rotation: *RandomBananaKiwiRotation
  - &RandomFruitSelectionNoBanana
    num_copies: !UniformDiscrete
      values: [2, 3]
    add_model: !UniformManipuland
      name: fruit
      values:
        - file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
          default_free_body_pose:
            fake_ycb_orange:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomOrangeTranslation
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
          default_free_body_pose:
            fake_sweet_crispin_apple:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomAppleTranslation
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
          default_free_body_pose:
            fake_kiwi:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomKiwiTranslation
              rotation: *RandomBananaKiwiRotation
  - &RandomFruitSelectionNoOrange
    num_copies: !UniformDiscrete
      values: [2, 3]
    add_model: !UniformManipuland
      name: fruit
      values:
        - file: package://lbm_eval_models/groceries/bananas/fake_ripe_banana.sdf
          default_free_body_pose:
            fake_banana:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomBananaTranslation
              rotation: *RandomBananaKiwiRotation
        - file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
          default_free_body_pose:
            fake_sweet_crispin_apple:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomAppleTranslation
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
          default_free_body_pose:
            fake_kiwi:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomKiwiTranslation
              rotation: *RandomBananaKiwiRotation
  - &RandomFruitSelectionNoApple
    num_copies: !UniformDiscrete
      values: [2, 3]
    add_model: !UniformManipuland
      name: fruit
      values:
        - file: package://lbm_eval_models/groceries/bananas/fake_ripe_banana.sdf
          default_free_body_pose:
            fake_banana:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomBananaTranslation
              rotation: *RandomBananaKiwiRotation
        - file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
          default_free_body_pose:
            fake_ycb_orange:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomOrangeTranslation
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
          default_free_body_pose:
            fake_kiwi:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomKiwiTranslation
              rotation: *RandomBananaKiwiRotation
  - &RandomFruitSelectionNoKiwi
    num_copies: !UniformDiscrete
      values: [2, 3]
    add_model: !UniformManipuland
      name: fruit
      values:
        - file: package://lbm_eval_models/groceries/bananas/fake_ripe_banana.sdf
          default_free_body_pose:
            fake_banana:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomBananaTranslation
              rotation: *RandomBananaKiwiRotation
        - file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
          default_free_body_pose:
            fake_ycb_orange:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomOrangeTranslation
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
          default_free_body_pose:
            fake_sweet_crispin_apple:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomAppleTranslation
              rotation: *RandomUniformRotation
  # Specific fruit.
  - &RandomBanana
    add_model:
      file: package://lbm_eval_models/groceries/bananas/fake_ripe_banana.sdf
      name: banana
      default_free_body_pose:
        fake_banana:
          base_frame: *RandomFruitMugCupBaseFrame
          translation: *RandomBananaTranslation
          rotation: *RandomBananaKiwiRotation
  - &RandomOrange
    add_model:
      file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
      name: orange
      default_free_body_pose:
        fake_ycb_orange:
          base_frame: *RandomFruitMugCupBaseFrame
          translation: *RandomOrangeTranslation
          rotation: *RandomUniformRotation
  - &RandomApple
    add_model:
      file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
      name: apple
      default_free_body_pose:
        fake_sweet_crispin_apple:
          base_frame: *RandomFruitMugCupBaseFrame
          translation: *RandomAppleTranslation
          rotation: *RandomUniformRotation
  - &RandomKiwi
    add_model:
      file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
      name: kiwi
      default_free_body_pose:
        fake_kiwi:
          base_frame: *RandomFruitMugCupBaseFrame
          translation: *RandomKiwiTranslation
          rotation: *RandomBananaKiwiRotation
  # Randomized mug and cup (tumbler).
  - &RandomMugAnyOrientation
    # Model the 4 possible mug orientations as different manipulands with
    # different frames inside the model that we are posing.
    add_model: !UniformManipuland
      name: mug
      values:
        # The upright case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            mug_bottom_center__z_up:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: &RandomMugZUpDownTranslation !UniformVector
                min: [-0.25, -0.1, 0.0]
                max: [ 0.25,  0.1, 0.0]
              rotation: &RandomMugRandomZRotation !Rpy
                deg: !UniformVector
                  min: [0, 0, -180]
                  max: [0, 0, 180]
        # The upside down case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            mug_top_center__z_down:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomMugZUpDownTranslation
              rotation: *RandomMugRandomZRotation
        # The y-up sideways case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            center__y_up:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: &RandomMugYUpDownTranslation !UniformVector
                min: [-0.25, -0.1, 0.04]
                max: [ 0.25,  0.1, 0.04]
              rotation: *RandomMugRandomZRotation
        # The y-down sideways case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            center__y_down:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomMugYUpDownTranslation
              rotation: *RandomMugRandomZRotation
  - &RandomMugNotUpright
    # Model the 4 possible mug orientations as different manipulands with
    # different frames inside the model that we are posing.
    add_model: !UniformManipuland
      name: mug
      values:
        # The upside down case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            mug_top_center__z_down:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomMugZUpDownTranslation
              rotation: *RandomMugRandomZRotation
        # The y-up sideways case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            center__y_up:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomMugYUpDownTranslation
              rotation: *RandomMugRandomZRotation
        # The y-down sideways case.
        - file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
          default_free_body_pose:
            center__y_down:
              base_frame: *RandomFruitMugCupBaseFrame
              translation: *RandomMugYUpDownTranslation
              rotation: *RandomMugRandomZRotation
  - &RandomCupUpright
    add_model:
      file: package://lbm_eval_models/tableware/tumblers/tumbler_8oz_tropical_pink.sdf
      name: cup
      default_free_body_pose:
        center_base__z_up:
          base_frame: *RandomFruitMugCupBaseFrame
          translation: !UniformVector
            min: [-0.25, -0.1, 0.0]
            max: [ 0.25,  0.1, 0.0]
          rotation: !Rpy
            deg: !UniformVector
              min: [0, 0, -180]
              max: [0, 0, -180]
  # Random coaster and saucer (plate).
  - &RandomCoaster
    add_model:
      file: package://lbm_eval_models/tableware/coasters/coaster_double_wood_cylinder_collision.sdf
      name: coaster
      default_free_body_pose:
        center_base__z_up:
          base_frame: manipuland_table::station_table_top
          translation: !UniformVector
            min: [-0.3, -0.5, 0.0]
            max: [ 0.2,  0.0, 0.0]
          rotation: !Rpy
            deg: !UniformVector
              min: [0, 0, -180]
              max: [0, 0, 180]
  - &RandomSaucer
    add_model:
      file: package://lbm_eval_models/tableware/plates/carlisle_plate_light_blue.sdf
      name: saucer
      default_free_body_pose:
        flush_bottom_center__z_up:
          base_frame: manipuland_table::station_table_top
          translation: !UniformVector
            min: [0.0, -0.1, 0.0]
            max: [0.2,  0.2, 0.0]
          rotation: !Rpy
            deg: !UniformVector
              min: [0, 0, -180]
              max: [0, 0, 180]
  # Task specific frames.
  - &CenterZone
    add_frame:
      name: center_zone
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.2, 0.0, 0.0]

_constraints:
