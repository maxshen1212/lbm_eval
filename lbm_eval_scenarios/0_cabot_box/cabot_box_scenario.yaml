  visualization:
    lcm_bus: visualizer_bus
    enable_meshcat_creation: true
    publish_illustration: true
    publish_contacts: true
    publish_proximity: true
    # Integer multiple of plant_config.timestep to avoid as many small
    # simulation steps as practical.
    publish_period: 0.05

simulation_scenario_PickAndPlaceBox:
  <<: *BaseScenario
  directives:
    - *RobotAndTable
    - add_model:
        file: package://lbm_eval_models/fictional/cubes/cube_maroon_5cm.sdf
        name: cube
        default_free_body_pose:
          center:
            base_frame: manipuland_table::station_table_top
            translation: !UniformVector
              min: [-0.25, 0.0, 0.2]
              max: [0.0, 0.2, 0.2]
    - add_model:
        file: package://lbm_eval_models/fictional/markers/torus.sdf
        name: torus_marker
    - add_weld:
        parent: manipuland_table::station_table_top
        child: torus_marker::center
        X_PC:
          # The torus is 1cm tall, so pose it such that it is slightly
          # protruding from the tabletop.
          translation: [0, 0, -0.009]
