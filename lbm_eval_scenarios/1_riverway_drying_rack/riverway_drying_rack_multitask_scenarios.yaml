        values: [640]
      height: !UniformDiscrete
        values: [480]
      rgb: true
      depth: true
      label: true
      X_PB:
        base_frame: "camera_6CD146030E96" ###===###
        # translation: !UniformVector
        #   min: [0, 0, 0]
        #   max: [0, 0, 0]
        # rotation: !AngleAxis
