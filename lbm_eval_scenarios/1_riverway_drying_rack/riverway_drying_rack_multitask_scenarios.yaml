    add_weld:
      parent: manipuland_table::origin
      child: _serving_spoon_approximate_center_bottom
      X_PC:
        translation: !UniformVector
          min: [0.22, -0.15, 0.0]
          max: [0.22, -0.1, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, 30]
            max: [0, 0, 150]
  # Target locations for various tasks.
  - &StackPlatesTarget
    add_frame:
      name: stack_plates_target
      X_PF:
        base_frame: manipuland_table::origin
        translation: [0.1, 0.1, 0.0]
  - &SpatulaOnTableTarget
    add_frame:
      name: spatula_on_table_target
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.2, -0.5, 0.0]
