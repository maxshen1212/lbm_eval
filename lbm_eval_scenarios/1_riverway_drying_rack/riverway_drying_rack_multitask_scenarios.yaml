_lcm_buses_options:
  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus)
  # to enable single-process simulation with Meldis visualization server.
  - &VisualizerLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus
  # and camera) to enable single-process simulation with Meldis visualization
  # server.
  - &VisualizerCameraLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: udpm://239.255.2.1:6776?ttl=0
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (including visualizer_bus)
  # to enable single-process simulation with Meshcat visualization only.
  - &VisualizerLocalOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus:
      lcm_url: memq://null

# List of directives that can be used to compose a scene.
_directives:
  # The robot and table.
  - &RobotAndTable
    add_directives:
      file: package://lbm_eval_models/stations/riverway/add_riverway_finray_mimic.dmd.yaml
  # Crock to put spatulas in.
  - &Crock_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/crocks/slnihams_bamboo_utensil_crock.sdf
      name: utensil_crock
  - &Crock_1
    add_weld:
      parent: manipuland_table::origin
      child: utensil_crock::origin
      X_PC:
        translation: !UniformVector
          min: [-0.05, -0.05, 0]
          max: [0.05, -0.15, 0]
  # Welded dish rack.
  - &DishRack_0
    add_directives:
      file: package://lbm_eval_models/kitchen_accessories/drying_racks/sweet_home_dish_drying_rack.dmd.yaml
  - &DishRack_1
    add_weld:
      parent: manipuland_table::origin
      child: drying_rack_base::origin
      X_PC:
        translation: !UniformVector
          min: [-0.10, 0.50, 0]
          max: [0.10, 0.55, 0]
        rotation: !Rpy
          deg: [0, 0, -90]
  # Transient bodies to help with stabilizing initialization.
  - &DishRackInitializationBody_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/drying_racks/sweet_home_dish_drying_rack_wireframe_initialization_body.sdf
      name: dishrack_wireframe_initialization_body
  - &DishRackInitializationBody_1
    add_weld:
      parent: drying_rack_wireframe::origin
      child: dishrack_wireframe_initialization_body::origin
  # Welded plates.
  - &WeldedPlates_0
    add_model:
      file: package://lbm_eval_models/tableware/plates/ikea_dinera_plate_8in_mesh_collision_blue.sdf
      name: plate_0
  - &WeldedPlatesInDryingRack_0
    add_weld: &PlateInDryingRackWeld
      parent: !UniformDiscreteString
        values: &DryingRackSlots
          - drying_rack_wireframe::plate_slot_rail_0
          - drying_rack_wireframe::plate_slot_rail_1
          - drying_rack_wireframe::plate_slot_rail_2
          - drying_rack_wireframe::plate_slot_rail_3
          - drying_rack_wireframe::plate_slot_rail_4
          - drying_rack_wireframe::plate_slot_rail_5
          - drying_rack_wireframe::plate_slot_rail_6
          - drying_rack_wireframe::plate_slot_rail_7
          - drying_rack_wireframe::plate_slot_rail_8
      child: plate_0::origin
      X_PC:
        translation: [0.00921943, 0.00230206, 0.02007212]
        rotation: !Rpy
          deg: [ 8.45543344e+01, -1.26025272e-03,  8.99875107e+01]
  - &WeldedPlates_1
    add_model:
      file: package://lbm_eval_models/tableware/plates/ikea_dinera_plate_8in_mesh_collision_blue.sdf
      name: plate_1
  - &WeldedPlatesInDryingRack_1
    add_weld:
      <<: *PlateInDryingRackWeld
      child: plate_1::origin
  # Mug holder and mugs.
  - &MugHolder_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/mug_holders/dorhors_wood_mug_holder.sdf
      name: mug_holder
  - &WeldedMugHolder_0
    add_weld:
      parent: manipuland_table::origin
      child: mug_holder::origin
      X_PC:
        translation: !UniformVector
          min: [0.05, -0.5, 0.0]
          max: [0.25, -0.3, 0.0]
  - &WeldedMugHolder_1
    add_weld:
      parent: manipuland_table::origin
      child: mug_holder::origin
      X_PC:
        translation: !UniformVector
          min: [-0.10, -0.32, 0.0]
          max: [-0.05, -0.27, 0.0]
  - &WeldedMugs_0
    add_model:
      file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
      name: mug_0
  - &WeldedMugs_1
    add_weld:
      parent: !UniformDiscreteString
        values:
          - mug_holder::bottom_right_branch_base
          - mug_holder::top_right_branch_base
          - mug_holder::mid_front_branch_base
          - mug_holder::mid_back_branch_base
      child: mug_0::origin
      X_PC:
        translation: [0.09434705, 0.01579505, 0.00668992]
        rotation: !Rpy
          deg: [-73.14290783, 6.61464528, 133.98682999]
  - &WeldedMugs_2
    add_model:
      file: package://lbm_eval_models/tableware/mugs/mug_inomata_white_mesh_collision.sdf
      name: mug_1
  - &WeldedMugs_3
    add_weld:
      parent: !UniformDiscreteString
        values:
          - mug_holder::bottom_left_branch_base
          - mug_holder::top_left_branch_base
      child: mug_1::origin
      X_PC:
        translation: [0.09434705, 0.01579505, 0.00668992]
        rotation: !Rpy
          deg: [-73.14290783, 6.61464528, 133.98682999]
  # Welded distractor serving spoon.
  - &WeldedServingSpoon_0
    add_model:
      file: package://lbm_eval_models/tableware/spoons/spoon_oxo_steel.sdf
      name: serving_spoon
  - &WeldedServingSpoon_1
    add_frame:
      name: _serving_spoon_bottom_flat_with_table
      X_PF:
        base_frame: serving_spoon::bottom
        rotation: !Rpy
          deg: [0, 5, 0]
  - &WeldedServingSpoon_2
    add_frame:
      name: _serving_spoon_approximate_center_bottom
      X_PF:
        base_frame: _serving_spoon_bottom_flat_with_table
        translation: [-0.075, 0, 0]
  - &WeldedServingSpoon_3
    add_weld:
      parent: manipuland_table::origin
      child: _serving_spoon_approximate_center_bottom
      X_PC:
        translation: !UniformVector
          min: [-0.21, -0.55, 0.0]
          max: [-0.15, -0.35, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -180]
            max: [0, 0, 180]
  - &WeldedServingSpoon_4
    add_weld:
      parent: manipuland_table::origin
