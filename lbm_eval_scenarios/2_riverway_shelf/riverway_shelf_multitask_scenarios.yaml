_lcm_buses_options:
  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus)
  # to enable single-process simulation with Meldis visualization server.
  - &VisualizerLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus
  # and camera) to enable single-process simulation with Meldis visualization
  # server.
  - &VisualizerCameraLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: udpm://239.255.2.1:6776?ttl=0
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (including visualizer_bus)
  # to enable single-process simulation with Meshcat visualization only.
  - &VisualizerLocalOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus:
      lcm_url: memq://null

# List of directives that can be used to compose a scene.
_directives:
  # The robot and table.
  - &RobotAndTable
    add_directives:
      file: package://lbm_eval_models/stations/riverway/add_riverway_finray_mimic.dmd.yaml
  # Shelving in the middle of the scene
  - &Shelving_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/shelves/vivo_custom_single_shelf.sdf
      name: shelving
  - &Shelving_1
    add_weld:
      parent: manipuland_table::origin
      child: shelving::origin
      X_PC:
        translation: [0.0, -0.05, 0]
        rotation: !Rpy
          deg: [0, 0, 180]
  # Cereal box start and target frames for StoreCerealBoxUnderShelf task.
  - &CerealBox0NearSideOfShelf_Start
    add_frame:
      name: cereal_box_0_start
      X_PF:
        base_frame: shelving::plywood_top_center__z_up
        # Note that this is within 1mm of collision in x, y, and z with a
        # hydroelastic margin of 0.1mm.
        translation: [-0.140, -0.049, 0.0003]
        rotation: !Rpy
          deg: [0, 0, 90]
  - &CerealBox0NearSideOfShelf_Start180
    add_frame:
      name: cereal_box_0_start_180
      X_PF:
        base_frame: cereal_box_0_start
        rotation: !Rpy
          deg: [0, 0, 180]
  - &CerealBox0NearSideOfShelf
    add_model:
      file: package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf
      name: cereal_box_0
      default_free_body_pose:
        punyos_cereal_box:
          base_frame: !UniformDiscreteString
            values:
            - cereal_box_0_start
            - cereal_box_0_start_180
  - &CerealBox0_Target
    add_frame:
      name: cereal_box_0_target
      X_PF:
        base_frame: cereal_box_0_start
  - &WeldedCerealBox0NearSideOfShelf_0
    add_model:
      file: package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf
      name: cereal_box_0
  - &WeldedCerealBox0NearSideOfShelf_1
    add_weld:
      parent: !UniformDiscreteString
        values:
          - cereal_box_0_start
          - cereal_box_0_start_180
      child:
        cereal_box_0::origin
  - &CerealBox0RandomizedPose
    add_model:
      file: package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf
      name: cereal_box_0
      default_free_body_pose:
        punyos_cereal_box:
          base_frame: shelving::plywood_top_center__z_up
          translation: !UniformVector
            min: [-0.05, -0.1, 0.0003]
            max: [-0.1,  0.1, 0.0003]
          rotation: !Rpy
            deg: !UniformVector
              min: [0, 0, 0]
              max: [0, 0, 360]
  - &CerealBox1_Start
    add_frame:
      name: cereal_box_1_start
      X_PF:
        base_frame: shelving::shelf_top_center__z_up
        rotation: !Rpy
          # The default pose has the long side of the cereal box perpendicular
          # to the long side of the shelf.
          deg: [0, 0, 90]
  - &CerealBox1_AtTop
    add_model:
      file: package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf
      name: cereal_box_1
      default_free_body_pose:
        punyos_cereal_box:
          base_frame: !UniformDiscreteString
            values:
              - cereal_box_1_start
              - cereal_box_1_start_180
          translation: !UniformVector
            min: [-0.02, -0.05, 0]
            max: [0.02, 0.05, 0]
          rotation: !Rpy
            deg: !UniformVector
              min: [0, 0, -45]
              max: [0, 0, 45]
  - &CerealBox1_Start180
    add_frame:
      name: cereal_box_1_start_180
      X_PF:
        base_frame: cereal_box_1_start
        rotation: !Rpy
          deg: [0, 0, 180]
  - &CerealBox1_Target
    add_frame:
      name: cereal_box_1_target
      X_PF:
        base_frame: cereal_box_0_start
        # The width of a Puny-o's cereal box
        translation: [0, -0.0505, 0]
  # Welded cereal box at a randomized pose under the shelf.
  - &WeldedCerealBox0RandomizedPose_0
    add_model:
      file: package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf
      name: cereal_box_0
  - &WeldedCerealBox0RandomizedPose_1
    add_weld:
      parent: shelving::plywood_top_center__z_up
      child: cereal_box_0::box_bottom_center__z_up
      X_PC:
        translation: !UniformVector
          # TODO(dale.mcconachie): We can't guarantee samples are collision
          # free, so manually offset the box in 'y' to ensure that even when
          # rotated it is not in collision with the shelving.
          min: [-0.065, -0.1, 0]
          max: [0.065, -0.1, 0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, 0]
            max: [0, 0, 360]
  # Bell pepper bin target bin.
  - &BellPepperBin_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/bins/container_amuse_white_issue7265_body_low.sdf
      name: bell_pepper_bin
  - &BellPepperBin_1
    add_weld:
      parent: manipuland_table::origin
      child: bell_pepper_bin::bottom
      X_PC:
        translation: !UniformVector
          min: [-0.23, 0.43, 0.0]
          max: [-0.16, 0.58, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, -45]
            max: [0, 0, 45]
  # Bell pepper start and target frames.
  - &BellPepper_Start
    add_frame:
      name: bell_pepper_start
      X_PF:
        base_frame: manipuland_table::origin
        translation: [-0.1, -0.4, 0.06]
  - &BellPepper_Target
    add_frame:
      name: bell_pepper_target
      X_PF:
        base_frame: bell_pepper_bin::center
  - &RedBellPepper
    add_model:
      file: package://lbm_eval_models/groceries/bell_peppers/red_bell_pepper_no_stem_scale_95.sdf
      name: bell_pepper_0
      default_free_body_pose:
        center__z_up:
          base_frame: bell_pepper_start
          translation: !UniformVector
            min: [-0.1, -0.1, 0]
            max: [0.1, 0.1, 0]
          # TODO(#11698) Replace this with !Uniform.
          rotation: !Rpy
            deg: !UniformVector
              min: [-180, -180, -180]
              max: [180, 180, 180]
  # Welded cereal box.
  - &WeldedCerealBox_0
    add_model:
      file: package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf
      name: cereal_box_0
  - &WeldedCerealBox_1
    add_weld:
      parent: shelving::plywood_top_center__z_up
      child: cereal_box_0::box_bottom_center__z_up
      X_PC:
        translation: !UniformVector
          # TODO(dale.mcconachie): We can't guarantee samples are collision
          # free, so manually offset the box in 'y' to ensure that even when
          # rotated it is not in collision with the shelving.
          min: [-0.1, -0.1, 0]
          max: [0.1, -0.1, 0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, 0]
            max: [0, 0, 360]
  # Welded cutting board and related.
  - &WeldedCuttingBoard_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/cutting_boards/oxo_plastic_cutting_board.sdf
      name: cutting_board_0
  - &WeldedCuttingBoard_1
    add_weld:
      parent: manipuland_table::origin
      child: cutting_board_0::oxo_plastic_cutting_board
      X_PC:
        translation: !UniformVector
          min: [0.05, 0.3, 0.0]
          max: [0.05, 0.5, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, 60]
            max: [0, 0, 120]
  - &WeldedCuttingBoardFruit_0
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/cutting_boards/oxo_plastic_cutting_board.sdf
      name: cutting_board_0
  - &WeldedCuttingBoardFruit_1
    add_weld:
      parent: manipuland_table::origin
      child: cutting_board_0::oxo_plastic_cutting_board
      X_PC:
        translation: !UniformVector
          min: [0.16, 0.33, 0.0]
          max: [0.16, 0.47, 0.0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, 20]
            max: [0, 0, -20]
  # Fruit bowl with fruit.
  - &FruitBowl_0
    add_model:
      file: package://lbm_eval_models/tableware/bowls/generic_fruit_bowl.sdf
      name: fruit_bowl
  - &FruitBowl_1
    add_weld:
      parent: manipuland_table::origin
      child: fruit_bowl::origin
      X_PC:
        translation: !UniformVector
          min: [0.05, -0.5, 0.0]
          max: [0.25, -0.3, 0.0]
  - &Fruit_0
    add_model: !UniformManipuland
      name: fruit_0
      values:
        # Apples
        - &GalaAppleInBowl_0
          file: package://lbm_eval_models/groceries/apples/gala_apple.sdf
          default_free_body_pose: &Fruit_0_FreeBodyPose
            mass_center__z_up:
              base_frame: fruit_bowl::origin
              translation: !UniformVector
                min: [-0.03, -0.03, 0.08]
                max: [0.03, 0.03, 0.08]
              # TODO(#11698) Replace this with !Uniform.
              rotation: !Rpy
                deg: !UniformVector
                  min: [-180, -180, -180]
                  max: [180, 180, 180]
        - &GoldenDeliciousAppleInBowl_0
          file: package://lbm_eval_models/groceries/apples/golden_delicious_apple.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        - &GrannySmithAppleInBowl_0
          file: package://lbm_eval_models/groceries/apples/granny_smith_apple.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        # Avocados
        - &FuerteAvocadoInBowl_0
          file: package://lbm_eval_models/groceries/avocados/fuerte_avocado.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        - &HassAvocadoInBowl_0
          file: package://lbm_eval_models/groceries/avocados/hass_avocado.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        - &LulaAvocadoInBowl_0
          file: package://lbm_eval_models/groceries/avocados/lula_avocado.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        # Pears
        - &BosePearInBowl_0
          file: package://lbm_eval_models/groceries/pears/bose_pear.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        - &GreenAnjouPearInBowl_0
          file: package://lbm_eval_models/groceries/pears/green_anjou_pear.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
        - &StarkrimsonPearInBowl_0
          file: package://lbm_eval_models/groceries/pears/starkrimson_pear.sdf
          default_free_body_pose: *Fruit_0_FreeBodyPose
  - &Fruit_0_NoApples
    add_model: !UniformManipuland
      name: fruit_0
      values:
        # Avocados
        - *FuerteAvocadoInBowl_0
        - *HassAvocadoInBowl_0
        - *LulaAvocadoInBowl_0
        # Pears
        - *BosePearInBowl_0
        - *GreenAnjouPearInBowl_0
        - *StarkrimsonPearInBowl_0
  - &Fruit_0_NoAvocados
    add_model: !UniformManipuland
      name: fruit_0
      values:
        # Apples
        - *GalaAppleInBowl_0
        - *GoldenDeliciousAppleInBowl_0
        - *GrannySmithAppleInBowl_0
        # Pears
        - *BosePearInBowl_0
        - *GreenAnjouPearInBowl_0
        - *StarkrimsonPearInBowl_0
  - &Fruit_0_NoPears
    add_model: !UniformManipuland
      name: fruit_0
      values:
        # Apples
        - *GalaAppleInBowl_0
        - *GoldenDeliciousAppleInBowl_0
        - *GrannySmithAppleInBowl_0
        # Avocados
        - *FuerteAvocadoInBowl_0
        - *HassAvocadoInBowl_0
        - *LulaAvocadoInBowl_0
  - &Fruit_1
    add_model: !UniformManipuland
      name: fruit_1
      values:
        # Apples
        - &GalaAppleInBowl_1
          file: package://lbm_eval_models/groceries/apples/gala_apple.sdf
          default_free_body_pose: &Fruit_1_FreeBodyPose
            mass_center__z_up:
              base_frame: fruit_bowl::origin
              translation: !UniformVector
                min: [-0.03, -0.03, 0.18]
                max: [0.03, 0.03, 0.18]
              # TODO(#11698) Replace this with !Uniform.
              rotation: !Rpy
                deg: !UniformVector
                  min: [-180, -180, -180]
                  max: [180, 180, 180]
        - &GoldenDeliciousAppleInBowl_1
          file: package://lbm_eval_models/groceries/apples/golden_delicious_apple.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        - &GrannySmithAppleInBowl_1
          file: package://lbm_eval_models/groceries/apples/granny_smith_apple.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        # Avocados
        - &FuerteAvocadoInBowl_1
          file: package://lbm_eval_models/groceries/avocados/fuerte_avocado.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        - &HassAvocadoInBowl_1
          file: package://lbm_eval_models/groceries/avocados/hass_avocado.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        - &LulaAvocadoInBowl_1
          file: package://lbm_eval_models/groceries/avocados/lula_avocado.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        # Pears
        - &BosePearInBowl_1
          file: package://lbm_eval_models/groceries/pears/bose_pear.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        - &GreenAnjouPearInBowl_1
          file: package://lbm_eval_models/groceries/pears/green_anjou_pear.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
        - &StarkrimsonPearInBowl_1
          file: package://lbm_eval_models/groceries/pears/starkrimson_pear.sdf
          default_free_body_pose: *Fruit_1_FreeBodyPose
  - &Fruit_1_OnlyApples
    add_model: !UniformManipuland
      name: fruit_1
      values:
        - *GalaAppleInBowl_1
        - *GoldenDeliciousAppleInBowl_1
        - *GrannySmithAppleInBowl_1
  - &Fruit_1_OnlyAvocados
    add_model: !UniformManipuland
      name: fruit_1
      values:
        - *FuerteAvocadoInBowl_1
        - *HassAvocadoInBowl_1
        - *LulaAvocadoInBowl_1
  - &Fruit_1_OnlyPears
    add_model: !UniformManipuland
      name: fruit_1
      values:
        - *BosePearInBowl_1
        - *GreenAnjouPearInBowl_1
        - *StarkrimsonPearInBowl_1

# List of constraints that we might apply.
_constraints:
  - &CerealBoxDoesntIntersectShelf
    !NonCollisionConstraint
    forbid_collision_between:
      - shelving::.*
      - cereal_box_0::.*
  - &RedBellPepperDoesntIntersectBowl
    !NonCollisionConstraint
    forbid_collision_between:
      - bell_pepper_0::.*
      - fruit_bowl::.*
  - &FruitDoesntIntersectBowl
    !NonCollisionConstraint
    forbid_collision_between:
      - fruit_bowl::.*
      - fruit_0::.*
      - fruit_1::.*

_base_scenario: &BaseScenario
  random_seed: 1
  simulation_duration: .inf
  plant_config:
    time_step: 10e-3
    penetration_allowance: 2e-3
    stiction_tolerance: 1e-4
    discrete_contact_approximation: lagged
    contact_model: hydroelastic_with_fallback
  scene_graph_config:
    default_proximity_properties:
      margin: 1e-4
  simulator_config:
    integration_scheme: runge_kutta2
    max_step_size: 0.001
    accuracy: 0.01
    use_error_control: false
    target_realtime_rate: 0.0
    publish_every_time_step: false
  directives:
    - *RobotAndTable
  item_locking:
    unlock_near_geometry:
      - "right::panda::panda_link3"
      - "right::panda::panda_link4"
      - "right::panda_hand::panda_leftfinger"
      - "right::panda_hand::panda_rightfinger"
      - "left::panda::panda_link3"
      - "left::panda::panda_link4"
      - "left::panda_hand::panda_leftfinger"
      - "left::panda_hand::panda_rightfinger"
  initial_position:
    right::panda: &InitialRightPandaPosition
      panda_joint1: [0.4363323129985824]      # range: [-2.8973, 2.8973]
      panda_joint2: [-0.6108652381980153]     # range: [-1.7628, 1.7628]
      panda_joint3: [0.0]                     # range: [-2.8973, 2.8973]
      panda_joint4: [-2.356194490192345]      # range: [-3.0718, -0.0698]
      panda_joint5: [0]                       # range: [-2.8973, 2.8973]
      panda_joint6: [1.8325957145940461]      # range: [-0.0175, 3.7525]
      panda_joint7: [-1.1344640137963142]     # range: [-2.8973, 2.8973]
    right::panda_hand: &InitialRightPandaHandPosition
      panda_finger_joint1: [-0.04]            # range: [-0.041, 0.0]
      panda_finger_joint2: [0.04]             # range: [0.0, 0.041]
    left::panda: &InitialLeftPandaPosition
      panda_joint1: [-0.6108652381980153]     # range: [-2.8973, 2.8973]
      panda_joint2: [-0.6108652381980153]     # range: [-1.7628, 1.7628]
      panda_joint3: [0]                       # range: [-2.8973, 2.8973]
      panda_joint4: [-2.356194490192345]      # range: [-3.0718, -0.0698]
      panda_joint5: [0]                       # range: [-2.8973, 2.8973]
      panda_joint6: [1.8325957145940461]      # range: [-0.0175, 3.7525]
      panda_joint7: [0.7853981633974483]      # range: [-2.8973, 2.8973]
    left::panda_hand: &InitialLeftPandaHandPosition
      panda_finger_joint1: [-0.04]            # range: [-0.041, 0.0]
      panda_finger_joint2: [0.04]             # range: [0.0, 0.041]
  lcm_buses: *VisualizerLcmBusOnly
  model_drivers:
    # N.B. The simulated arm is a panda arm, but the Iiwa driver used here (and
    # below) is compatible software.  See
    # https://github.com/RobotLocomotion/drake/issues/22994 for further
    # discussion.
    right::panda: !IiwaDriver
      hand_model_name: "right::panda_hand"
      arm_child_frame_name: panda_link0
      gripper_parent_frame_name: panda_link8
      control_mode: position_only
      ext_joint_filter_tau: 0.01
      lcm_bus: right
      # TODO(anzu#12109) review this number and its effect on dynamics.
      lcm_status_period: 0.001
    # N.B. The simulated gripper is a panda hand, but the WSG driver used here
    # (and below) is compatible software.
    right::panda_hand: !SchunkWsgImplicitPdDriver {}
    left::panda: !IiwaDriver
      hand_model_name: "left::panda_hand"
      arm_child_frame_name: panda_link0
      gripper_parent_frame_name: panda_link8
      control_mode: position_only
      ext_joint_filter_tau: 0.01
      lcm_bus: left
      # TODO(anzu#12109) review this number and its effect on dynamics.
      lcm_status_period: 0.001
    left::panda_hand: !SchunkWsgImplicitPdDriver {}
  cameras:
    # Cameras as defined in package://lbm_eval_models/stations/riverway/add_riverway_without_grippers.dmd.yaml.
    - &RiverwaySceneCameraRight
      name: "6CD146030E96"
      focal: !FocalLength
        # Enforce fx == fy by declaring only one of them (fx).
        x: !Uniform
          min: 381
          max: 381
        # Uncomment the following block to randomize fy independently.
        # y: !Uniform
        #   min: 381
        #   max: 381
      # Note: Omitting the definition of principal point (cx, cy) here places
      # it at the center of the image by default.
      # Uncomment this block to randomize these independently.
      # center_x: !Uniform
      #   min: 319.5
      #   max: 319.5
      # center_y: !Uniform
      #   min: 239.5
      #   max: 239.5
      center_x: 321.269 ###===###
      center_y: 247.86 ###---###
      # For now, we need to specify discrete values for !UniformDiscrete
      # TODO(rcory) Implement something like !UniformDiscreteRange in
      # `take_scenario_sample`
      width: !UniformDiscrete
        values: [640]
      height: !UniformDiscrete
        values: [480]
      rgb: true
      depth: true
      label: true
      X_PB:
        base_frame: "camera_6CD146030E96" ###===###
        # translation: !UniformVector
        #   min: [0, 0, 0]
        #   max: [0, 0, 0]
        # rotation: !AngleAxis
        #   angle_deg: !Uniform
        #     min: 0
        #     max: 0
        #   axis: !GaussianVector
        #     mean: [0, 0, 0]
        #     stddev: [1, 1, 1]
        rotation: !Rpy
          deg: [75.0, -8.0, 187]
        translation: [0.1, -0.8, 0.7] ###---###
      fps: 20
      renderer_name: "renderer_1"
      renderer_class: !RenderEngineVtkParams
        lights:
          - color: !Hsv
              hsv: !UniformVector
                min: [0.66, 0, 1.0]
                max: [0.33, 0.5, 1.0]
            attenuation_values: [1, 0, 0]
            frame: "world"
            intensity: !Uniform { min: 1.5, max: 4.0 }
            direction: !UniformVector
              min: [0, -0.5, -1]
              max: [0.5, 0.5, -1]
            cone_angle: 20
            type: "directional"
        environment_map:
          skybox: true
          texture: !EquirectangularMap
            path: package://lbm_eval_models/environment_maps/poly_haven_studio_4k.hdr
        exposure: 0.4
        cast_shadows: true
        shadow_map_size: 1024
      lcm_bus: camera
    - &RiverwaySceneCameraLeft
      <<: *RiverwaySceneCameraRight
      name: "6CD146030E9E"
      focal: !FocalLength
        # Enforce fx == fy by declaring only one of them (fx).
        x: !Uniform
          min: 381
          max: 381
        # Uncomment the following block to randomize fy independently.
        # y: !Uniform
        #   min: 381
        #   max: 381
      # Note: Omitting the definition of principal point (cx, cy) here places
      # it at the center of the image by default.
      # Uncomment this block to randomize these independently.
      # center_x: !Uniform
      #   min: 319.5
      #   max: 319.5
      # center_y: !Uniform
      #   min: 239.5
      #   max: 239.5
      # For now, we need to specify discrete values for !UniformDiscrete
      # TODO(rcory) Implement something like !UniformDiscreteRange in
      # `take_scenario_sample`
      width: !UniformDiscrete
        values: [640]
      height: !UniformDiscrete
        values: [480]
      X_PB:
        base_frame: camera_6CD146030E9E
        translation: !UniformVector
          min: [0, 0, 0]
          max: [0, 0, 0]
        rotation: !AngleAxis
          angle_deg: !Uniform
            min: 0
            max: 0
          axis: !GaussianVector
            mean: [0, 0, 0]
            stddev: [1, 1, 1]
      renderer_class: "RenderEngineVtk"
    # Cameras as defined in package://lbm_eval_models/stations/riverway/add_riverway_without_grippers.dmd.yaml.
    - &RiverwayWristCameraRightMinus
      <<: *RiverwaySceneCameraRight
      name: "6CD146030AFC"
      focal: !FocalLength
        # Enforce fx == fy by declaring only one of them (fx).
        x: !Uniform
          min: 268
          max: 268
        # Uncomment the following block to randomize fy independently.
        # y: !Uniform
        #   min: 268
        #   max: 268
      # Note: Omitting the definition of principal point (cx, cy) here places
