      # Note: Omitting the definition of principal point (cx, cy) here places
      # it at the center of the image by default.
      # Uncomment this block to randomize these independently.
      # center_x: !Uniform
      #   min: 319.5
      #   max: 319.5
      # center_y: !Uniform
      #   min: 239.5
      #   max: 239.5
      # For now, we need to specify discrete values for !UniformDiscrete
      # TODO(rcory) Implement something like !UniformDiscreteRange in
      # `take_scenario_sample`
      width: !UniformDiscrete
        values: [640]
      height: !UniformDiscrete
        values: [480]
      X_PB:
        base_frame: camera_6CD146030B09
        translation: !UniformVector
          min: [0, 0, 0]
          max: [0, 0, 0]
        rotation: !Rpy
          deg: !UniformVector
            min: [0, 0, 0]
            max: [0, 0, 0]
      renderer_class: "RenderEngineVtk"
  visualization:
    lcm_bus: visualizer_bus
    enable_meshcat_creation: true
    publish_illustration: true
    # TODO(drake#20545) Re-enable contact publishing once it no longer has
    # a meaningful simulation speed impact.
    publish_contacts: false
    publish_proximity: true
    # Integer multiple of plant_config.timestep to avoid as many small
    # simulation steps as practical.
    publish_period: 0.05

