_aliases:
  - &gripper_open_width 0.1
  - &skill TurnLargeContainerUpsideDown
  - &t_max 40.0

_teleop_policies:
  - &DualSpaceMouseTeleopPolicy
    !DualSpaceMousePolicyConfig
    devices:
      - model_name: right::panda
        gripper_name: right::panda_hand
        config:
          gripper_open_width: *gripper_open_width
      - model_name: left::panda
        gripper_name: left::panda_hand
        config:
          gripper_open_width: *gripper_open_width
    skill: *skill
  - &OculusTeleopPolicy
    !OculusTeleopPolicyConfig
    controllers:
      right:
        model_name: right::panda
        gripper_name: right::panda_hand
        config:
          gripper_open_width: *gripper_open_width
      left:
        model_name: left::panda
        gripper_name: left::panda_hand
        config:
          gripper_open_width: *gripper_open_width
    translation_scale: 1.6
    skill: *skill

UserToSim: !MultiarmScenarioConfig &multiarm_scenario_sim
  env: !HardwareStationScenarioSimulationEnvConfig &hardware_sim_env
    station_name: cabot
    skill: *skill
    default_language_instruction: "Turn the large container upside down"
    user_input: !UserInputFootSwitchConfig {}
    robot_setup: !MulitarmRobotSetup
      diff_ik_names: &diff_ik_names
        - "right::panda"
        - "left::panda"
      diff_ik_frames:
        - "right::panda::panda_link8"
        - "left::panda::panda_link8"
      gripper_names: &gripper_names
        - "right::panda_hand"
        - "left::panda_hand"
    simulation_scenario_config: !SimulationScenarioConfig &scenario_config
      scenario_file: package://lbm_eval_scenarios/4_cabot_kitchen_tabletop/cabot_kitchen_tabletop_multitask_scenarios.yaml
      scenario_name: simulation_scenario_KitchenTabletop
      # The realtime rate is unlimited in the simulation scenario file; limit
      # it to real time for teleoperation.
      scenario_text: '{ simulator_config: { target_realtime_rate: 1.0 } }'
      # It can take many trials to find a satisfied scenario, so we use all CPUs
      # to sample the scenario in parallel.
      num_sample_processes: null
    camera_overrides:
      remove_cameras: True
    dt: 0.1
    reward_configs:
      - !RelativeTranslationDistanceCostConfig
        name: larger_container_on_table
        frame_a_name: larger_container::origin
        frame_b_name: manipuland_table::origin
        p_AGa: &container_top [0, 0, 0.04]
      - !AxisPointsInDirectionRewardConfig
        name: larger_container_facing_down
        frame_name: larger_container::origin
        axis_F: [0.0, 0.0, 1.0]
        direction_W: [0.0, 0.0, -1.0]
    task_predicate_configs:
      - !OnTopPredicateConfig
        name: larger_container_on_table
        top_object_name: larger_container
        top_object_frame_name: origin
        bottom_object_name: manipuland_table
        bottom_object_frame_name: origin
        p_TGt: *container_top
        # Allow some minor penetration.
        p_BGb: [0.0, 0.0, -0.005]
        z_threshold: 0.02
        # Anywhere on the table.
        xy_threshold: 2
        require_support: True
        require_no_fingers_touching: True
        top_object_velocity_bound: 0.005
      - !AxisPointsInDirectionPredicateConfig
        name: larger_container_facing_down
        frame_name: larger_container::origin
        axis_F: [0, 0, 1.0]
        direction_W: [0, 0, -1.0]
        threshold_deg: 5
      - !FramesInRelativeBoxPredicateConfig
        name: stay_above_table
        # Note that we are picking frames that are not on the bottom surface of
        # the manipulands to ensure that that the named frames stay above the
        # table surface even with hydroelastic compliance.
        frame_A_names:
          - plate::flush_top_center__z_up
          - larger_container::origin
          - smaller_container::origin
          - fruit.*::origin
          # Avocados.
          - vegetable.*::mass_center__z_up
          # Red bell peppers.
          - vegetable.*::center__z_up
          # Note that the non-distribution shifted version of this task does
          # not have any distractors, but we include this for easier
          # distribution shift support.
          - distractor.*::origin
        frame_B_name: manipuland_table::origin
        # X and Y are set to match the table extents; Z is set to an
        # arbitrarily large range.
        p_BP_lo: [-0.3575, -0.7, 0.0]
        p_BP_hi: [ 0.3575,  0.7, 1.0]
      - !AtLeastOneSatisfiedPredicateConfig
        # We would like to measure some predicates without requiring that
        # they be satisfied at the terminal state. I.e.; transitory things like
        # "the small container is over the large container" to asses if a
        # "dump-like" motion has happened. To do that we add a predicate
        # that will always evaluate to true, with sub predicates that can have
        # any value without affecting the value of the overall task predicates
        # with a combination of `AtLeastOneSatisfiedPredicateConfig` and
        # `AlwaysSatisfiedPredicateConfig`.
        name: partial_credits
        predicate_configs:
          - !AlwaysSatisfiedPredicateConfig
            name: always_satisfied
          - !FingersContactPredicateConfig
            name: partial_credits.right_hand_touch_larger_container
            body_name: larger_container
            expect_contact: True
            finger_namespace: right::panda_hand
          - !FingersContactPredicateConfig
            name: partial_credits.left_hand_touch_larger_container
            body_name: larger_container
            expect_contact: True
            finger_namespace: left::panda_hand
          - !AxisPointsInDirectionPredicateConfig
            name: partial_credits.large_container_turn_45_degrees
            frame_name: larger_container::origin
            axis_F: [0, 0, 1]
            direction_W: [0, 0, -1]
            threshold_deg: 135 # 180-45
          - !AxisPointsInDirectionPredicateConfig
            name: partial_credits.large_container_turn_90_degrees
            frame_name: larger_container::origin
            axis_F: [0, 0, 1]
            direction_W: [0, 0, -1]
            threshold_deg: 90  # 180-90
          - !AxisPointsInDirectionPredicateConfig
            name: partial_credits.large_container_turn_135_degrees
            frame_name: larger_container::origin
            axis_F: [0, 0, 1]
            direction_W: [0, 0, -1]
            threshold_deg:  45  # 180-135
          - !AxisPointsInDirectionPredicateConfig
            # Not part of task related partial credit assignment, but can be
            # used to detect the case where a policy flips the small container
            # instead of the large one.
            name: partial_credits.small_container_turn_45_degrees
            frame_name: smaller_container::origin
            axis_F: [0, 0, 1]
            direction_W: [0, 0, -1]
            threshold_deg: 135 # 180-45
          - !AxisPointsInDirectionPredicateConfig
            name: partial_credits.small_container_turn_90_degrees
            frame_name: smaller_container::origin
            axis_F: [0, 0, 1]
            direction_W: [0, 0, -1]
            threshold_deg: 90  # 180-90
          - !AxisPointsInDirectionPredicateConfig
            name: partial_credits.small_container_turn_135_degrees
            frame_name: smaller_container::origin
            axis_F: [0, 0, 1]
            direction_W: [0, 0, -1]
            threshold_deg:  45  # 180-135
          - !AxisPointsInDirectionPredicateConfig
            name: partial_credits.small_container_facing_down
            frame_name: smaller_container::origin
            axis_F: [0, 0, 1.0]
            direction_W: [0, 0, -1.0]
            threshold_deg: 5
    diff_ik_config: !DifferentialInverseKinematicsConfig
      allow_finger_table_collision: true
      config_file: package://anzu/intuitive/visuomotor/demo/visuomotor_multi_frame_pose_stream_dual_arm_panda.yaml
  controller:
    # policy: *DualSpaceMouseTeleopPolicy
    policy: *OculusTeleopPolicy

UserToSimDualSpaceMouse: !MultiarmScenarioConfig
  <<: *multiarm_scenario_sim
  env: !HardwareStationScenarioSimulationEnvConfig
    <<: *hardware_sim_env
    user_input: !UserInputJoystickConfig {}
  controller:
    policy: *DualSpaceMouseTeleopPolicy

RosServerToSim: !MultiarmScenarioConfig
  << : *multiarm_scenario_sim
  env: !HardwareStationScenarioSimulationEnvConfig
    <<: *hardware_sim_env
    t_max: *t_max
    user_input: !UserInputNoneConfig {}
    simulation_scenario_config: !SimulationScenarioConfig
      <<: *scenario_config
      # Disable LCM visualization; remove the realtime rate override.
      scenario_text: '{ lcm_buses: { visualizer_bus: { lcm_url: memq://null } } }'
    camera_overrides:
      remove_cameras: False
  controller:
    policy: !RosServicePolicyConfig {}

GrpcServerToSim: !MultiarmScenarioConfig
  << : *multiarm_scenario_sim
  env: !HardwareStationScenarioSimulationEnvConfig
    <<: *hardware_sim_env
    t_max: *t_max
    user_input: !UserInputNoneConfig {}
    simulation_scenario_config: !SimulationScenarioConfig
      <<: *scenario_config
      # Disable LCM visualization; remove the realtime rate override.
      scenario_text: '{ lcm_buses: { visualizer_bus: { lcm_url: memq://null } } }'
    camera_overrides:
      remove_cameras: False
  controller:
    policy: !LbmPolicyClientConfig {}

ReplayToSim: !MultiarmScenarioConfig
  env: !HardwareStationScenarioSimulationEnvConfig
    <<: *hardware_sim_env
    user_input: !UserInputNoneConfig {}
    simulation_scenario_config: !SimulationScenarioConfig
      <<: *scenario_config
      # Disable LCM visualization; remove the realtime rate override.
      scenario_text: '{ lcm_buses: { visualizer_bus: { lcm_url: memq://null } } }'
    camera_overrides:
      remove_cameras: False
  controller:
    policy: !ReplayPolicyConfig
      episode_file: NEEDS_OVERWRITE
      skill: *skill

DiffusionInProcessSim: !MultiarmScenarioConfig
  env: !HardwareStationScenarioSimulationEnvConfig
    <<: *hardware_sim_env
    t_max: *t_max
    user_input: !UserInputNoneConfig {}
    simulation_scenario_config: !SimulationScenarioConfig
      <<: *scenario_config
      # Disable LCM visualization; remove the realtime rate override.
      scenario_text: '{ lcm_buses: { visualizer_bus: { lcm_url: memq://null } } }'
    camera_overrides:
      remove_cameras: False
  controller:
    policy: !DiffusionPolicyConfig
      checkpoint_file: NEEDS_OVERWRITE
      num_open_loop_steps: null
      # N.B. This is actually a "convert" action, not a restore action. It
      # converts the neural network's flat output to a structured
      # PosesAndGrippers format.
      restore_action: !RestorePosesAndGrippersConfig
        model_names: *diff_ik_names
        gripper_names: *gripper_names
      skill: *skill

NoOp: !MultiarmScenarioConfig
  env: !HardwareStationScenarioSimulationEnvConfig
    <<: *hardware_sim_env
    user_input: !UserInputNoneConfig {}
    simulation_scenario_config: !SimulationScenarioConfig
      <<: *scenario_config
      # Disable LCM visualization; remove the realtime rate override.
      scenario_text: '{ lcm_buses: { visualizer_bus: { lcm_url: memq://null } } }'
    camera_overrides:
      remove_cameras: False
  controller:
    policy: !MultiarmNoopPolicyConfig
      skill: *skill
