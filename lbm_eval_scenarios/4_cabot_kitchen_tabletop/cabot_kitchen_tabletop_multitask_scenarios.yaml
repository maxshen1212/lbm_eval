simulation_scenario_KitchenTabletop:
  <<: *BaseScenario
  directives:
    - *RobotAndTable
    - *Plate
    - *LargerContainer
    - *SmallerContainer
    - *Fruits
    - *Vegetables
  preconditions:
    num_sample_attempts: 300
    constraints:
      NoCollisionsGeneric: *NoCollisionsGeneric
      NoManipulandsFarEdgeBetweenArms: *NoManipulandsFarEdgeBetweenArms
