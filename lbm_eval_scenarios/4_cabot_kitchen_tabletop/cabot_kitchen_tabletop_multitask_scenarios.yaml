_lcm_buses_options:
  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus)
  # to enable single-process simulation with Meldis visualization server.
  - &VisualizerLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (except visualizer_bus
  # and camera) to enable single-process simulation with Meldis visualization
  # server.
  - &VisualizerCameraLcmBusOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: udpm://239.255.2.1:6776?ttl=0
    default:
      lcm_url: memq://null
    visualizer_bus: {}

  # Define LCM Buses. Set all buses to memq://null (including visualizer_bus)
  # to enable single-process simulation with Meshcat visualization only.
  - &VisualizerLocalOnly
    left:
      lcm_url: memq://null
    right:
      lcm_url: memq://null
    camera:
      lcm_url: memq://null
    default:
      lcm_url: memq://null
    visualizer_bus:
      lcm_url: memq://null

_transform_aliases:
  - &PlateContainerTranslation !UniformVector
      min: [-0.2, -0.5, 0.01]
      max: [ 0.0,  0.5, 0.01]
  - &RandomUniformRotation !Rpy
    deg: !UniformVector
      min: [-180, -180, -180]
      max: [180, 180, 180]
  - &RandomPlateContainerRotation !Rpy
    deg: !UniformVector
      min: [0, 0, -180]
      max: [0, 0,  180]
  - &RandomKiwiAvocadoRotation !Rpy
    deg:
      # Rotate the kiwi so that the long dimension is parallel to
      # the table.
      - !UniformDiscrete {values: [90, -90]}
      - 0
      # Rotate around z by any amount.
      - !Uniform {min: -180, max:  180}
  - &RandomPearRotation !Rpy
    deg:
      # Rotate the pear so that the long dimension is parallel to
      # the table, or is upright on the wide base.
      - !UniformDiscrete {values: [90, 0, -90]}
      - 0
      # Rotate around z by any amount.
      - !Uniform {min: -180, max:  180}

# List of directives that can be used to compose a scene.
_directives:
  # The robot and table.
  - &RobotAndTable
    add_directives:
      file: package://lbm_eval_models/stations/cabot/add_cabot_simulation.dmd.yaml
  - &Plate
    add_model:
      file: package://lbm_eval_models/tableware/plates/ikea_dinera_plate_8in_mesh_collision_blue.sdf
      name: plate
      default_free_body_pose:
        flush_bottom_center__z_up:
          base_frame: manipuland_table::station_table_top
          translation: *PlateContainerTranslation
          rotation: *RandomPlateContainerRotation
  - &LargerContainer
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/bins/container_amuse_body_large_white.sdf
      name: larger_container
      default_free_body_pose:
        at_rest_right_side_up:
          base_frame: manipuland_table::station_table_top
          translation: *PlateContainerTranslation
          rotation: *RandomPlateContainerRotation
  - &SmallerContainer
    add_model:
      file: package://lbm_eval_models/kitchen_accessories/bins/container_amuse_body_small_white.sdf
      name: smaller_container
      default_free_body_pose:
        at_rest_right_side_up:
          base_frame: manipuland_table::station_table_top
          translation: *PlateContainerTranslation
          rotation: *RandomPlateContainerRotation
  - &Fruits
    num_copies: !UniformDiscrete
      values: [1, 2, 3]
    add_model: !UniformManipuland
      name: fruit
      values:
        # Note that the translations used throughout have different z-values
        # to help the fruit not roll around much after initialization.
        - file: package://lbm_eval_models/groceries/apples/fake_green_sweet_crispin_apple.sdf
          default_free_body_pose:
            fake_sweet_crispin_apple:
              base_frame: manipuland_table::station_table_top
              translation: !UniformVector
                min: [0.05, -0.5, 0.037]
                max: [0.25,  0.5, 0.037]
              # TODO(#11698) Replace this with !Uniform.
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/oranges/fake_ripe_ycb_orange.sdf
          default_free_body_pose:
            fake_ycb_orange:
              base_frame: manipuland_table::station_table_top
              translation: !UniformVector
                min: [0.05, -0.5, 0.038]
                max: [0.25,  0.5, 0.038]
              rotation: *RandomUniformRotation
        - file: package://lbm_eval_models/groceries/berries/fake_ripe_kiwi.sdf
          default_free_body_pose:
            fake_kiwi:
              base_frame: manipuland_table::station_table_top
              translation: !UniformVector
                min: [0.05, -0.5, 0.027]
                max: [0.25,  0.5, 0.027]
              rotation: *RandomKiwiAvocadoRotation
        - file: package://lbm_eval_models/groceries/pears/green_anjou_pear.sdf
          default_free_body_pose:
            mass_center__z_up:
              base_frame: manipuland_table::station_table_top
              translation: !UniformVector
                min: [0.05, -0.5, 0.040]
                max: [0.25,  0.5, 0.040]
              rotation: *RandomPearRotation
  - &Vegetables
    num_copies: !UniformDiscrete
      values: [1, 2]
    add_model: !UniformManipuland
      name: vegetable
      values:
        # Note that the translations used throughout have different z-values
        # to help the fruit not roll around much after initialization.
        - file: package://lbm_eval_models/groceries/avocados/hass_avocado.sdf
          default_free_body_pose:
            mass_center__z_up:
              base_frame: manipuland_table::station_table_top
              translation: !UniformVector
                min: [0.05, -0.5, 0.041]
                max: [0.25,  0.5, 0.041]
              rotation: *RandomKiwiAvocadoRotation
        - file: package://lbm_eval_models/groceries/bell_peppers/red_bell_pepper_no_stem_scale_95.sdf
          default_free_body_pose:
            center__z_up:
              base_frame: manipuland_table::station_table_top
              translation: !UniformVector
                min: [0.05, -0.5, 0.05]
                max: [0.25,  0.5, 0.05]
              rotation: *RandomUniformRotation

_constraints:
  - &NoCollisionsGeneric
    !NonCollisionConstraint
    forbid_collision_between:
      - plate::.*
      - larger_container::.*
      - smaller_container::.*
      - fruit.*::.*
      - vegetable.*::.*
      - distractor.*::.*
  - &NoManipulandsFarEdgeBetweenArms
    # Fruit and vegetables are not allowed to be at the far edge of the table
    # away from the arms, in the area directly between the arms.
    !FramesNotInXYRegionConstraint
    frame_A_names:
      - fruit.*::.*
      - vegetable.*::.*
    frame_B_name: manipuland_table::station_table_top
    region_B: !XYRectangle
      min: [0.2, -0.2]
      max: [0.3,  0.2]

_base_scenario: &BaseScenario
  random_seed: 1
  simulation_duration: .inf
  plant_config:
    # Note that this is deliberately smaller than our other simulations. See
    # https://tri-internal.slack.com/archives/C05N7QM7GGL/p1743077709540279 .
    # This must also be paired with a custom `lbm_eval_0_5` update to drake to
    # use https://github.com/RobotLocomotion/drake/pull/22640 but for this
    # scenario only.
    time_step: 5e-3
    penetration_allowance: 2e-3
    stiction_tolerance: 1e-4
    discrete_contact_approximation: lagged
    contact_model: hydroelastic_with_fallback
  scene_graph_config:
    default_proximity_properties:
      margin: 1e-4
  simulator_config:
    integration_scheme: runge_kutta2
    max_step_size: 0.001
    accuracy: 0.01
    use_error_control: false
    target_realtime_rate: 0.0
    publish_every_time_step: false
  directives:
    - *RobotAndTable
  item_locking:
    # Note that this is different from other scenarios. This is Dale being
    # conservative on the new scenario as we don't have much time to test.
    t_start: 0.2
    unlock_near_geometry:
      - "right::panda::panda_link3"
      - "right::panda::panda_link4"
      - "right::panda_hand::finray_finger_L"
      - "right::panda_hand::finray_finger_R"
      - "left::panda::panda_link3"
      - "left::panda::panda_link4"
      - "left::panda_hand::finray_finger_L"
      - "left::panda_hand::finray_finger_R"
  initial_position:
    right::panda:
      panda_joint1: [0.4363323129985824]      # range: [-2.8973, 2.8973]
      panda_joint2: [-0.6108652381980153]     # range: [-1.7628, 1.7628]
      panda_joint3: [0.0]                     # range: [-2.8973, 2.8973]
      panda_joint4: [-2.356194490192345]      # range: [-3.0718, -0.0698]
      panda_joint5: [0]                       # range: [-2.8973, 2.8973]
      panda_joint6: [1.8325957145940461]      # range: [-0.0175, 3.7525]
      panda_joint7: [-1.1344640137963142]     # range: [-2.8973, 2.8973]
    right::panda_hand:
      finger_joint_1: [-0.05]      # range: [-0.0545, 0.0]
      finger_joint_2: [0.05]      # range: [0.0, 0.0545]
    left::panda:
      panda_joint1: [-0.6108652381980153]     # range: [-2.8973, 2.8973]
      panda_joint2: [-0.6108652381980153]     # range: [-1.7628, 1.7628]
      panda_joint3: [0]                       # range: [-2.8973, 2.8973]
      panda_joint4: [-2.356194490192345]      # range: [-3.0718, -0.0698]
      panda_joint5: [0]                       # range: [-2.8973, 2.8973]
      panda_joint6: [1.8325957145940461]      # range: [-0.0175, 3.7525]
      panda_joint7: [0.7853981633974483]      # range: [-2.8973, 2.8973]
    left::panda_hand:
      finger_joint_1: [-0.05]      # range: [-0.0545, 0.0]
      finger_joint_2: [0.05]      # range: [0.0, 0.0545]
  lcm_buses: *VisualizerLcmBusOnly
  model_drivers:
    # N.B. The simulated arm is a panda arm, but the Iiwa driver used here (and
    # below) is compatible software.  See
    # https://github.com/RobotLocomotion/drake/issues/22994 for further
    # discussion.
    right::panda: !IiwaDriver
      hand_model_name: "right::panda_hand"
      arm_child_frame_name: panda_link0
      gripper_parent_frame_name: panda_link8
      control_mode: position_only
      ext_joint_filter_tau: 0.01
      lcm_bus: right
      # TODO(anzu#12109) review this number and its effect on dynamics.
      lcm_status_period: 0.001
    right::panda_hand: !SchunkWsgImplicitPdDriver {}
    left::panda: !IiwaDriver
      hand_model_name: "left::panda_hand"
      arm_child_frame_name: panda_link0
      gripper_parent_frame_name: panda_link8
      control_mode: position_only
      ext_joint_filter_tau: 0.01
      lcm_bus: left
      # TODO(anzu#12109) review this number and its effect on dynamics.
      lcm_status_period: 0.001
    left::panda_hand: !SchunkWsgImplicitPdDriver {}
  cameras:
    # Cameras as defined in package://lbm_eval_models/stations/cabot/add_cabot_without_grippers.dmd.yaml.
    # Intrinsics were taken from the IRL Salem station, and recorded in:
    # https://github.shared-services.aws.tri.global/robotics/anzu/issues/14465#issuecomment-58991
    # https://github.shared-services.aws.tri.global/robotics/anzu/issues/14460#issuecomment-59117
    - &CabotSceneCameraRight
      name: "6CD146030E99"
      focal: !FocalLength
        x: !Uniform
          min: 616.129
          max: 616.129
        y: !Uniform
          min: 615.758
          max: 615.758
      # center_x: !Uniform ###===###
      #   min: 321.269
      #   max: 321.269
      # center_y: !Uniform
      #   min: 247.864
      #   max: 247.864
      center_x: 321.269
      center_y: 247.864 ###---###
      # For now, we need to specify discrete values for !UniformDiscrete
      # TODO(rcory) Implement something like !UniformDiscreteRange in
      # `take_scenario_sample`
      width: !UniformDiscrete
        values: [640]
      height: !UniformDiscrete
        values: [480]
      rgb: true
      depth: true
      label: true
      X_PB:
        base_frame: camera_6CD146030E99 ###===###
        # translation: !UniformVector
        #   min: [0, 0, 0]
        #   max: [0, 0, 0]
        # rotation: !AngleAxis
        #   angle_deg: !Uniform
        #     min: 0
        #     max: 0
        #   axis: !GaussianVector
        #     mean: [0, 0, 0]
        #     stddev: [1, 1, 1]
        rotation: !Rpy
          deg: [70.0, -10.0, 180.0]
        translation: [-0.15, -1.2, 0.6] ###---###
        # center_x: 321.269
        # center_y: 247.864
      fps: 20
      renderer_name: "renderer_1"
      renderer_class: !RenderEngineVtkParams
        lights:
          - color: !Hsv
              hsv: !UniformVector
                min: [0.66, 0, 1.0]
                max: [0.33, 0.5, 1.0]
            attenuation_values: [1, 0, 0]
            frame: "world"
            intensity: !Uniform { min: 1.5, max: 4.0 }
            direction: !UniformVector
              min: [0, -0.5, -1]
              max: [0.5, 0.5, -1]
            cone_angle: 20
            type: "directional"
        environment_map:
          skybox: true
          texture: !EquirectangularMap
            path: package://lbm_eval_models/environment_maps/poly_haven_studio_4k.hdr
        exposure: 0.4
        cast_shadows: true
        shadow_map_size: 1024
      lcm_bus: camera
    - &CabotSceneCameraLeft
