directives:
- add_directives: {file: 'package://lbm_eval_models/stations/riverway/add_riverway_finray_mimic.dmd.yaml'}
- add_model: {file: 'package://lbm_eval_models/kitchen_accessories/shelves/vivo_custom_single_shelf.sdf',
    name: shelving}
- add_weld:
    X_PC:
      rotation: !Rpy
        deg: [0, 0, 180]
      translation: [0.0, -0.05, 0]
    child: shelving::origin
    parent: manipuland_table::origin
- add_model: {file: 'package://lbm_eval_models/groceries/cereals/punyos_cereal_box.sdf',
    name: cereal_box_0}
- add_weld:
    X_PC:
      rotation: !Rpy
        deg: !UniformVector
          max: [0, 0, 360]
          min: [0, 0, 0]
      translation: !UniformVector
        max: [0.065, -0.1, 0]
        min: [-0.065, -0.1, 0]
    child: cereal_box_0::box_bottom_center__z_up
    parent: shelving::plywood_top_center__z_up
- add_model: {file: 'package://lbm_eval_models/kitchen_accessories/bins/container_amuse_white_issue7265_body_low.sdf',
    name: bell_pepper_bin}
- add_weld:
    X_PC:
      rotation: !Rpy
        deg: !UniformVector
          max: [0, 0, 45]
          min: [0, 0, -45]
      translation: !UniformVector
        max: [-0.16, 0.58, 0.0]
        min: [-0.23, 0.43, 0.0]
    child: bell_pepper_bin::bottom
    parent: manipuland_table::origin
- add_frame:
    X_PF:
      base_frame: manipuland_table::origin
      translation: [-0.1, -0.4, 0.06]
    name: bell_pepper_start
- add_frame:
    X_PF: {base_frame: 'bell_pepper_bin::center'}
    name: bell_pepper_target
- add_model:
    default_free_body_pose:
      center__z_up:
        base_frame: bell_pepper_start
        rotation: !Rpy
          deg: !UniformVector
            max: [180, 180, 180]
            min: [-180, -180, -180]
        translation: !UniformVector
          max: [0.1, 0.1, 0]
          min: [-0.1, -0.1, 0]
    file: package://lbm_eval_models/groceries/bell_peppers/red_bell_pepper_no_stem_scale_95.sdf
    name: bell_pepper_0
- add_model: {file: 'package://lbm_eval_models/kitchen_accessories/cutting_boards/oxo_plastic_cutting_board.sdf',
    name: cutting_board_0}
- add_weld:
    X_PC:
      rotation: !Rpy
        deg: !UniformVector
          max: [0, 0, -20]
          min: [0, 0, 20]
      translation: !UniformVector
        max: [0.16, 0.47, 0.0]
        min: [0.16, 0.33, 0.0]
    child: cutting_board_0::oxo_plastic_cutting_board
    parent: manipuland_table::origin
- add_model: {file: 'package://lbm_eval_models/tableware/bowls/generic_fruit_bowl.sdf',
    name: fruit_bowl}
- add_weld:
    X_PC:
      translation: !UniformVector
        max: [0.25, -0.3, 0.0]
        min: [0.05, -0.5, 0.0]
    child: fruit_bowl::origin
    parent: manipuland_table::origin
- add_model: !UniformManipuland
    name: fruit_0
    values:
    - default_free_body_pose: &id001
        mass_center__z_up:
          base_frame: fruit_bowl::origin
          rotation: !Rpy
            deg: !UniformVector
              max: [180, 180, 180]
              min: [-180, -180, -180]
          translation: !UniformVector
            max: [0.03, 0.03, 0.08]
            min: [-0.03, -0.03, 0.08]
      file: package://lbm_eval_models/groceries/avocados/fuerte_avocado.sdf
    - default_free_body_pose: *id001
      file: package://lbm_eval_models/groceries/avocados/hass_avocado.sdf
    - default_free_body_pose: *id001
      file: package://lbm_eval_models/groceries/avocados/lula_avocado.sdf
    - default_free_body_pose: *id001
      file: package://lbm_eval_models/groceries/pears/bose_pear.sdf
    - default_free_body_pose: *id001
      file: package://lbm_eval_models/groceries/pears/green_anjou_pear.sdf
    - default_free_body_pose: *id001
      file: package://lbm_eval_models/groceries/pears/starkrimson_pear.sdf
- add_model: !UniformManipuland
    name: fruit_1
    values:
    - default_free_body_pose: &id002
        mass_center__z_up:
          base_frame: fruit_bowl::origin
          rotation: !Rpy
            deg: !UniformVector
              max: [180, 180, 180]
              min: [-180, -180, -180]
          translation: !UniformVector
            max: [0.03, 0.03, 0.18]
            min: [-0.03, -0.03, 0.18]
      file: package://lbm_eval_models/groceries/apples/gala_apple.sdf
    - default_free_body_pose: *id002
      file: package://lbm_eval_models/groceries/apples/golden_delicious_apple.sdf
    - default_free_body_pose: *id002
      file: package://lbm_eval_models/groceries/apples/granny_smith_apple.sdf
