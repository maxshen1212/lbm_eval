model_drivers:
  left::panda: !IiwaDriver {arm_child_frame_name: panda_link0, control_mode: position_only,
    ext_joint_filter_tau: 0.01, gripper_parent_frame_name: panda_link8, hand_model_name: 'left::panda_hand',
    lcm_bus: left, lcm_status_period: 0.001}
  left::panda_hand: !SchunkWsgImplicitPdDriver {}
  right::panda: !IiwaDriver {arm_child_frame_name: panda_link0, control_mode: position_only,
    ext_joint_filter_tau: 0.01, gripper_parent_frame_name: panda_link8, hand_model_name: 'right::panda_hand',
    lcm_bus: right, lcm_status_period: 0.001}
  right::panda_hand: !SchunkWsgImplicitPdDriver {}
plant_config: {contact_model: hydroelastic_with_fallback, discrete_contact_approximation: lagged,
  penetration_allowance: 2e-3, stiction_tolerance: 1e-4, time_step: 10e-3}
preconditions:
  constraints:
    FruitDoesntIntersectBowl: !NonCollisionConstraint
      forbid_collision_between: ['fruit_bowl::.*', 'fruit_0::.*', 'fruit_1::.*']
    RedBellPepperDoesntIntersectBowl: !NonCollisionConstraint
      forbid_collision_between: ['bell_pepper_0::.*', 'fruit_bowl::.*']
random_seed: 100000113
scene_graph_config:
  default_proximity_properties: {margin: 1e-4}
simulation_duration: .inf
simulator_config: {accuracy: 0.01, integration_scheme: runge_kutta2, max_step_size: 0.001,
  publish_every_time_step: false, target_realtime_rate: 0.0, use_error_control: false}
visualization: {enable_meshcat_creation: true, lcm_bus: visualizer_bus, publish_contacts: false,
  publish_illustration: true, publish_period: 0.05, publish_proximity: true}
